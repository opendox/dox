<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 1" preserveAspectRatio="none">
    <style>
        .line { stroke: #000000; stroke-width: 1; }

        @media (prefers-color-scheme: dark) {
        .line { stroke: #ffffff; }
        }
    </style>

    <line class="line" x1="0" y1="0.5" x2="100" y2="0.5"/>
</svg>