name: Maintenance
description: Request maintenance, tooling, cleanup, CI, or dependency work.
title: "[Maintenance]: "
labels:
  - "type: maintenance"
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This is maintenance work, not a new feature request or bug report.
          required: true

  - type: dropdown
    id: maintenance-type
    attributes:
      label: Maintenance Type
      options:
        - Dependency update
        - Tooling
        - CI
        - Build
        - Refactor
        - Configuration
        - Repository hygiene
        - Security hardening
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be maintained and why?
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risk Or Impact
      description: Does this affect builds, tests, deployments, dependencies, configuration, data, or developer workflow?
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
