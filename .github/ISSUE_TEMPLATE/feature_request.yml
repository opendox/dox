name: Feature Request
description: Propose a scoped capability for Dox.
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: markdown
    attributes:
      value: |
        Dox is intentionally scoped around Web, Scheduling, Collection, Computation, plugins, and PostgreSQL-first analytics. Please describe the feature in terms of real user value and system boundaries.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can explain the user or business problem this feature solves.
          required: true
        - label: I understand this issue is a proposal, not a guarantee of implementation.
          required: true

  - type: textarea
    id: background
    attributes:
      label: Background
      description: What problem or opportunity does this feature address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Dox do?
      placeholder: Describe the behavior, workflow, data source, plugin, API, UI, or operation you want.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Primary Area
      options:
        - Web
        - Scheduling
        - Collection
        - Computation
        - Plugin
        - Frontend
        - Database
        - Operations
        - Security
        - Documentation
        - Unsure
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What should this feature not include?
      placeholder: List boundaries so the issue stays reviewable.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Related Links
      placeholder: "- Refs #"
    validations:
      required: false
