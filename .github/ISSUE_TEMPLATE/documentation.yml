name: Documentation
description: Report missing, outdated, or unclear documentation.
title: "[Docs]: "
labels:
  - "type: docs"
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I checked the current README or documentation before filing this issue.
          required: true

  - type: textarea
    id: location
    attributes:
      label: Documentation Location
      placeholder: |
        - File:
        - Section:
        - URL:
    validations:
      required: false

  - type: textarea
    id: issue
    attributes:
      label: Documentation Issue
      description: What is missing, unclear, incorrect, or outdated?
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
    validations:
      required: false

  - type: textarea
    id: links
    attributes:
      label: Related Links
      placeholder: "- Refs #"
    validations:
      required: false
