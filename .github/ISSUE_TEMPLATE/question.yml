name: Question
description: Ask a question about dox
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about dox? Please fill out the form below.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Related Area
      description: Which area does your question relate to?
      options:
        - Installation/Setup
        - Configuration
        - API Usage
        - Data Management
        - Analytics
        - Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context that might help us answer your question.
